<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TikTok Downloader - by Xez</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --bg-input: #27272a;
            --brand-pink: #FE2C55;
            --brand-pink-hover: #E62248;
            --brand-cyan: #25F4EE;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-color-hover: rgba(255, 255, 255, 0.2);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text-primary);
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(254, 44, 85, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(37, 244, 238, 0.08), transparent 25%);
            background-attachment: fixed;
            line-height: 1.6;
        }

        /* Ambient Glow Behind Card */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: linear-gradient(45deg, rgba(254,44,85,0.1), rgba(37,244,238,0.1));
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            max-width: 800px;
            width: 100%;
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .app-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .app-title {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Beautiful Gradient Text */
        .text-gradient {
            background: linear-gradient(135deg, var(--brand-cyan), var(--text-primary), var(--brand-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-description {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 500;
        }

        /* Modern Input Group */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        .url-input {
            width: 100%;
            padding: 1.25rem 1.25rem 1.25rem 3rem;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition);
        }

        .url-input:focus {
            outline: none;
            border-color: var(--brand-pink);
            box-shadow: 0 0 0 4px rgba(254, 44, 85, 0.15);
            background: rgba(39, 39, 42, 0.8);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .paste-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .paste-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .main-button {
            width: 100%;
            padding: 1.25rem;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--brand-pink);
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
            box-shadow: 0 8px 20px -6px rgba(254, 44, 85, 0.5);
        }

        .main-button:hover {
            background: var(--brand-pink-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -6px rgba(254, 44, 85, 0.6);
        }

        /* Enhanced Preview Area (Grid Layout) */
        .preview-container {
            display: none;
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            background: var(--bg-input);
            padding: 16px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .video-box {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modern Info Section */
        .info-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .creator-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .creator-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .creator-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .creator-username {
            color: var(--brand-cyan);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* SOLUSI ICON COPY KECIL: Action Buttons yang Jelas */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.5;
        }

        .action-btn:hover {
            background: var(--brand-cyan);
            color: var(--bg-main);
            border-color: var(--brand-cyan);
            transform: scale(1.05);
        }

        .caption-wrapper {
            position: relative;
        }

        .caption-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .caption-textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            min-height: 100px;
            line-height: 1.5;
        }

        .caption-textarea:focus {
            outline: none;
            border-color: var(--brand-cyan);
        }

        .copy-caption-btn {
            position: absolute;
            top: 36px;
            right: 12px;
            width: 36px;
            height: 36px;
        }

        /* Chips / Badges for Data */
        .badges-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge svg {
            width: 16px;
            height: 16px;
            color: var(--brand-cyan);
        }

        .badge.highlight {
            background: rgba(37, 244, 238, 0.1);
            border-color: rgba(37, 244, 238, 0.3);
            color: var(--brand-cyan);
        }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        /* Progress Bar Download */
        .download-btn {
            position: relative;
            overflow: hidden;
        }
        
        .progress-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 0%;
            background: rgba(0,0,0,0.2);
            transition: width 0.1s linear;
        }

        .btn-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Loader */
        .loader-container {
            display: none;
            justify-content: center;
            padding: 2rem 0;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--brand-pink);
            border-right-color: var(--brand-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .footer span { color: var(--brand-cyan); font-weight: 700; }

        /* Notification Toast Modern */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            background: var(--text-primary);
            color: var(--bg-main);
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: toastEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast.error {
            background: var(--brand-pink);
            color: white;
        }

        @keyframes toastEnter {
            0% { transform: translateY(50px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes toastLeave {
            to { transform: translateY(50px) scale(0.9); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 1.5rem; border-radius: var(--radius-lg); }
            .preview-grid { grid-template-columns: 1fr; }
            .video-box { min-height: 300px; height: 350px; }
            .action-grid { grid-template-columns: 1fr; }
            .app-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="glow-effect"></div>
    
    <div class="container">
        <div class="app-header">
            <h1 class="app-title">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span class="text-gradient">TikTok Save</span>
            </h1>
            <p class="app-description">Unduh Video Kualitas HD Tanpa Watermark</p>
        </div>

        <div class="input-group" id="search-section">
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                <input type="text" class="url-input" id="url" placeholder="Tempel URL video TikTok di sini..." autocomplete="off">
                <button class="paste-btn" id="paste-btn" onclick="handlePaste()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Paste
                </button>
            </div>
        </div>

        <button class="main-button" id="search-button" onclick="fetchVideoInfo()">
            Cari Video Sekarang
        </button>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
        </div>

        <div class="preview-container" id="preview">
            <div class="preview-grid">
                <div class="video-box">
                    <video id="video-preview" class="video-preview" controls></video>
                </div>
                
                <div class="info-box">
                    <div class="creator-card">
                        <div class="creator-info">
                            <span class="creator-name" id="author-name">Nama Kreator</span>
                            <span class="creator-username" id="author-username">@username</span>
                        </div>
                        <button class="action-btn" onclick="copyText('author-username')" title="Copy Username">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="badges-container">
                        <div class="badge highlight">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                            </svg>
                            <span id="quality">No Watermark</span>
                        </div>
                        <div class="badge">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            <span id="duration">00:00</span>
                        </div>
                    </div>

                    <div class="caption-wrapper">
                        <span class="caption-label">Caption Video</span>
                        <textarea id="caption" class="caption-textarea" readonly></textarea>
                        <button class="action-btn copy-caption-btn" onclick="copyText('caption')" title="Copy Caption">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="action-grid">
                <button class="main-button download-btn" id="downloadBtn" onclick="startDownload()">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="btn-content" id="downloadText">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download Video
                    </div>
                </button>
                <button class="main-button btn-secondary" onclick="resetForm()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    Download Lainnya
                </button>
            </div>
        </div>
        
        <div class="footer">Didesain ulang oleh <span>Xez</span> | 2026</div>
    </div>

    <div class="toast-container" id="toastBox"></div>

    <script>
        let videoData = null;
        let isDownloading = false;

        function showToast(msg, isError = false) {
            let toastBox = document.getElementById('toastBox');
            let toast = document.createElement('div');
            toast.classList.add('toast');
            if (isError) toast.classList.add('error');
            
            let icon = isError ? 
                '<svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>' : 
                '<svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            
            toast.innerHTML = icon + msg;
            toastBox.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastLeave 0.4s ease forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('url').value = text;
                showToast('URL berhasil ditempel');
            } catch (err) {
                showToast('Gagal mengakses clipboard', true);
            }
        }

        function copyText(id) {
            let element = document.getElementById(id);
            let text = element.tagName === 'TEXTAREA' ? element.value : element.innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Teks berhasil disalin!');
            });
        }

        function formatDuration(seconds) {
            if (!seconds) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function fetchVideoInfo() {
            const urlInput = document.getElementById('url').value.trim();
            if (!urlInput.includes('tiktok.com')) {
                showToast('Harap masukkan URL TikTok yang valid!', true);
                return;
            }

            document.getElementById('search-section').style.display = 'none';
            document.getElementById('search-button').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const json = await response.json();

                if (!json.data || !json.data.play) throw new Error("Video tidak ditemukan/Private");

                const isHd = json.data.hdplay != null;
                videoData = {
                    url: isHd ? json.data.hdplay : json.data.play,
                    id: json.data.id,
                    quality: isHd ? 'HD Quality' : 'SD Quality',
                    ext: 'mp4'
                };

                document.getElementById('video-preview').src = videoData.url;
                document.getElementById('author-name').innerText = json.data.author.nickname;
                document.getElementById('author-username').innerText = `@${json.data.author.unique_id}`;
                document.getElementById('quality').innerText = videoData.quality;
                document.getElementById('duration').innerText = formatDuration(json.data.duration);
                document.getElementById('caption').value = json.data.title || "Tidak ada caption.";

                document.getElementById('loader').style.display = 'none';
                document.getElementById('preview').style.display = 'block';

            } catch (error) {
                showToast(error.message, true);
                resetForm();
            }
        }

        function startDownload() {
            if (isDownloading || !videoData) return;
            isDownloading = true;

            const btnText = document.getElementById('downloadText');
            const progress = document.getElementById('progressBar');
            
            btnText.innerHTML = 'Mengunduh... 0%';
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', videoData.url, true);
            xhr.responseType = 'blob';

            xhr.onprogress = (e) => {
                if (e.lengthComputable) {
                    let percent = Math.round((e.loaded / e.total) * 100);
                    progress.style.width = percent + '%';
                    btnText.innerHTML = `Mengunduh... ${percent}%`;
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const url = window.URL.createObjectURL(xhr.response);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `TikTok_${videoData.id}.${videoData.ext}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    showToast('Video berhasil diunduh!');
                } else {
                    window.open(videoData.url, '_blank');
                }
                resetDownloadBtn();
            };

            xhr.onerror = () => {
                window.open(videoData.url, '_blank');
                resetDownloadBtn();
            };

            xhr.send();
        }

        function resetDownloadBtn() {
            isDownloading = false;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('downloadText').innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg> Download Video`;
        }

        function resetForm() {
            document.getElementById('url').value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('video-preview').pause();
            document.getElementById('video-preview').src = '';
            
            document.getElementById('search-section').style.display = 'flex';
            document.getElementById('search-button').style.display = 'flex';
            document.getElementById('loader').style.display = 'none';
            videoData = null;
        }
    </script>
</body>
</html>
