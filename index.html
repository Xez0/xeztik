<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - by Xez</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --bg-input: #27272a;
            --brand-pink: #FE2C55;
            --brand-pink-hover: #E62248;
            --brand-cyan: #25F4EE;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-color-hover: rgba(255, 255, 255, 0.2);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text-primary);
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(254, 44, 85, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(37, 244, 238, 0.08), transparent 25%);
            background-attachment: fixed;
            line-height: 1.6;
        }

        .glow-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; max-width: 800px; height: 100%;
            background: linear-gradient(45deg, rgba(254,44,85,0.1), rgba(37,244,238,0.1));
            filter: blur(80px); z-index: -1; pointer-events: none;
        }

        .container {
            background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem; border-radius: var(--radius-xl); max-width: 800px; width: 100%;
            position: relative; border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);
        }

        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

        .app-header { text-align: center; margin-bottom: 2.5rem; }
        
        .app-title {
            font-size: 2.25rem; font-weight: 800; letter-spacing: -0.02em;
            margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--brand-cyan), var(--text-primary), var(--brand-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .app-description { color: var(--text-secondary); font-size: 1.05rem; font-weight: 500; }

        .input-group { position: relative; margin-bottom: 1.5rem; display: flex; gap: 12px; }
        .input-wrapper { position: relative; flex: 1; }

        .url-input {
            width: 100%; padding: 1.25rem 100px 1.25rem 3rem; background: var(--bg-input);
            border: 2px solid var(--border-color); border-radius: var(--radius-lg);
            font-size: 1rem; font-weight: 500; color: var(--text-primary); font-family: inherit; transition: var(--transition);
        }

        .url-input:focus { outline: none; border-color: var(--brand-pink); box-shadow: 0 0 0 4px rgba(254, 44, 85, 0.15); background: rgba(39, 39, 42, 0.8); }

        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }

        .paste-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-color);
            padding: 8px 14px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px; transition: var(--transition);
        }
        .paste-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }

        .main-button {
            width: 100%; padding: 1.25rem; border: none; border-radius: var(--radius-lg); background: var(--brand-pink);
            color: white; font-weight: 700; font-size: 1.125rem; font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; transition: var(--transition); box-shadow: 0 8px 20px -6px rgba(254, 44, 85, 0.5);
        }
        .main-button:hover { background: var(--brand-pink-hover); transform: translateY(-2px); box-shadow: 0 12px 25px -6px rgba(254, 44, 85, 0.6); }

        .preview-container { display: none; opacity: 0; animation: slideUp 0.5s ease forwards; }
        .preview-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; background: var(--bg-input); padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 24px; }

        .video-box {
            width: 100%; height: 100%; min-height: 400px; border-radius: var(--radius-md); overflow: hidden; 
            background: #000; position: relative; display: flex; justify-content: center; align-items: center;
        }

        .video-preview { width: 100%; height: 100%; object-fit: contain; }
        
        .image-gallery {
            width: 100%; height: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scroll-behavior: smooth; display: none; -ms-overflow-style: none; scrollbar-width: none; 
        }
        .image-gallery::-webkit-scrollbar { display: none; }
        .image-gallery img { width: 100%; height: 100%; object-fit: contain; scroll-snap-align: start; flex: 0 0 100%; }
        
        .image-counter {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 4px 12px; border-radius: 20px; 
            font-size: 0.8rem; font-weight: bold; pointer-events: none; z-index: 5;
        }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(24, 24, 27, 0.6); color: white; border: 1px solid rgba(255,255,255,0.2);
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: none; 
            align-items: center; justify-content: center; transition: var(--transition); z-index: 10;
            backdrop-filter: blur(4px);
        }
        .nav-btn:hover { background: var(--brand-cyan); color: var(--bg-main); border-color: var(--brand-cyan); transform: translateY(-50%) scale(1.1); }
        .nav-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .prev-btn { left: 8px; }
        .next-btn { right: 8px; }

        .info-box { display: flex; flex-direction: column; gap: 20px; }
        .creator-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .creator-info { display: flex; flex-direction: column; gap: 4px; }
        .creator-name { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }
        .creator-username { color: var(--brand-cyan); font-weight: 500; font-size: 0.95rem; }

        .action-btn { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: var(--radius-md); background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); }
        .action-btn svg { width: 20px; height: 20px; stroke-width: 2.5; }
        .action-btn:hover { background: var(--brand-cyan); color: var(--bg-main); border-color: var(--brand-cyan); transform: scale(1.05); }

        .caption-wrapper { position: relative; }
        .caption-label { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; }
        .caption-textarea {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: var(--radius-md); 
            padding: 16px; padding-right: 54px; color: var(--text-primary); font-family: inherit; font-size: 0.95rem; 
            resize: none; min-height: 100px; line-height: 1.5;
        }
        .caption-textarea:focus { outline: none; border-color: var(--brand-cyan); }
        .caption-textarea::-webkit-scrollbar { width: 6px; }
        .caption-textarea::-webkit-scrollbar-track { background: transparent; }
        .caption-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .caption-textarea::-webkit-scrollbar-thumb:hover { background: var(--brand-cyan); }
        
        .copy-caption-btn { position: absolute; top: 36px; right: 12px; width: 36px; height: 36px; }

        .badges-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .badges-container { display: flex; gap: 12px; flex-wrap: wrap; }
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 100px; font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); transition: var(--transition); }
        .badge svg { width: 16px; height: 16px; }
        .badge.highlight { background: rgba(37, 244, 238, 0.1); border-color: rgba(37, 244, 238, 0.3); color: var(--brand-cyan); }
        .badge.highlight svg { color: var(--brand-cyan); }

        .hd-warning { display: none; align-items: center; gap: 8px; color: var(--brand-pink); font-size: 0.85rem; font-weight: 600; background: rgba(254, 44, 85, 0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(254, 44, 85, 0.2); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); box-shadow: none; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        .download-btn { position: relative; overflow: hidden; }
        .progress-bar { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background: rgba(0,0,0,0.2); transition: width 0.1s linear; }
        .btn-content { position: relative; z-index: 2; display: flex; align-items: center; gap: 8px; }

        .single-photo-download { 
            display: none; flex-direction: column; gap: 16px; 
            margin-bottom: 20px; 
            animation: slideUp 0.5s ease forwards; 
        }
        .divider { 
            display: flex; align-items: center; text-align: center; 
            color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; margin: 8px 0; 
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        .single-action-row { display: flex; gap: 16px; align-items: stretch; }
        
        .number-input-group { 
            display: flex; align-items: center; background: var(--bg-input); 
            border: 1px solid var(--border-color); border-radius: var(--radius-md); 
            overflow: hidden; width: 140px; flex-shrink: 0;
        }
        .num-btn { 
            background: transparent; border: none; color: var(--text-primary); 
            width: 40px; height: 100%; cursor: pointer; font-size: 1.2rem; 
            transition: var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .num-btn:hover { background: rgba(255,255,255,0.1); color: var(--brand-cyan); }
        .num-input { 
            flex: 1; width: 100%; text-align: center; background: transparent; 
            border: none; color: var(--text-primary); font-size: 1rem; font-weight: 700; 
            font-family: inherit; -moz-appearance: textfield; outline: none;
        }
        .num-input::-webkit-outer-spin-button, .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .single-dl-btn { flex: 1; font-size: 1rem; }

        .loader-container { display: none; justify-content: center; padding: 2rem 0; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--border-color); border-top-color: var(--brand-pink); border-right-color: var(--brand-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer { margin-top: 2rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; }
        .footer span { color: var(--brand-cyan); font-weight: 700; }

        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .toast { background: var(--text-primary); color: var(--bg-main); padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: toastEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast.error { background: var(--brand-pink); color: white; }
        @keyframes toastEnter { 0% { transform: translateY(50px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes toastLeave { to { transform: translateY(50px) scale(0.9); opacity: 0; } }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; border-radius: var(--radius-lg); }
            .preview-grid { grid-template-columns: 1fr; }
            .video-box { min-height: 300px; height: 350px; }
            .action-grid { grid-template-columns: 1fr; }
            .nav-btn { width: 40px; height: 40px; }
            .app-title { font-size: 1.8rem; }
            .single-action-row { flex-direction: column; }
            .number-input-group { width: 100%; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="glow-effect"></div>
    
    <div class="container">
        <div class="app-header">
            <h1 class="app-title">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span class="text-gradient">Xeztik</span>
            </h1>
            <p class="app-description">Unduh Video & Foto Original dari TikTok</p>
        </div>

        <div class="input-group" id="search-section">
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                <input type="text" class="url-input" id="url" placeholder="Tempel URL TikTok (Video/Foto) di sini..." autocomplete="off">
                <button class="paste-btn" id="paste-btn" onclick="handlePaste()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Paste
                </button>
            </div>
        </div>

        <button class="main-button" id="search-button" onclick="fetchVideoInfo()">
            Cari Konten Sekarang
        </button>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
        </div>

        <div class="preview-container" id="preview">
            <div class="preview-grid">
                
                <div class="video-box" id="media-container">
                    <button class="nav-btn prev-btn" id="prev-btn" onclick="slideGallery(-1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button class="nav-btn next-btn" id="next-btn" onclick="slideGallery(1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>

                    <video id="video-preview" class="video-preview" controls></video>
                    <div id="image-gallery" class="image-gallery"></div>
                    <div id="image-counter" class="image-counter" style="display: none;">Memuat...</div>
                </div>
                
                <div class="info-box">
                    <div class="creator-card">
                        <div class="creator-info">
                            <span class="creator-name" id="author-name">Nama Kreator</span>
                            <span class="creator-username" id="author-username">@username</span>
                        </div>
                        <button class="action-btn" onclick="copyText('author-username')" title="Copy Username">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="badges-wrapper">
                        <div class="badges-container">
                            <div class="badge" id="quality-badge">
                                <span id="icon-slot-1"></span>
                                <span id="quality">Memuat...</span>
                            </div>
                            <div class="badge" style="color: var(--text-primary);">
                                <span id="icon-slot-2" style="display: flex; align-items: center; color: var(--text-secondary);"></span>
                                <span id="duration">00:00</span>
                            </div>
                        </div>
                        
                        <div class="hd-warning" id="hd-warning">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            Video kualitas HD tidak tersedia, otomatis dialihkan ke versi SD.
                        </div>
                    </div>

                    <div class="caption-wrapper">
                        <span class="caption-label">Caption Postingan</span>
                        <textarea id="caption" class="caption-textarea" readonly></textarea>
                        <button class="action-btn copy-caption-btn" onclick="copyText('caption')" title="Copy Caption">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="single-photo-download" id="single-photo-download">
                <div class="single-action-row">
                    <div class="number-input-group">
                        <button class="num-btn" onclick="updatePhotoInput(-1)">-</button>
                        <input type="number" id="photo-target" class="num-input" value="1" min="1" onchange="validatePhotoInput()">
                        <button class="num-btn" onclick="updatePhotoInput(1)">+</button>
                    </div>
                    <button class="main-button btn-secondary single-dl-btn" id="singleDlBtn" onclick="downloadSingle()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Unduh Foto ke-<span id="target-label">1</span>
                    </button>
                </div>
                <div class="divider"><span>Atau</span></div>
            </div>

            <div class="action-grid">
                <button class="main-button download-btn" id="downloadBtn" onclick="startDownload()">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="btn-content" id="downloadText">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        <span id="downloadBtnLabel">Download File</span>
                    </div>
                </button>
                <button class="main-button btn-secondary" onclick="resetForm()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    Download Lainnya
                </button>
            </div>

        </div>
        
        <div class="footer">Dibuat oleh: <span>Xez</span> | 2026</div>
    </div>

    <div class="toast-container" id="toastBox"></div>

    <script>
        let mediaData = null;
        let isDownloading = false;

        const SVG_VIDEO = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>`;
        const SVG_CLOCK = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
        const SVG_PHOTO = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`;
        const SVG_LAYERS = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>`;

        function showToast(msg, isError = false) {
            let toastBox = document.getElementById('toastBox');
            let toast = document.createElement('div');
            toast.classList.add('toast');
            if (isError) toast.classList.add('error');
            
            let icon = isError ? 
                '<svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>' : 
                '<svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            
            toast.innerHTML = icon + msg;
            toastBox.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastLeave 0.4s ease forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('url').value = text;
                showToast('URL berhasil ditempel');
            } catch (err) {
                showToast('Gagal mengakses clipboard', true);
            }
        }

        function copyText(id) {
            let element = document.getElementById(id);
            let text = element.tagName === 'TEXTAREA' ? element.value : element.innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Teks berhasil disalin!');
            });
        }

        function formatDuration(seconds) {
            if (!seconds) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // FUNGSI NAVIGASI FOTO
        function slideGallery(direction) {
            const gallery = document.getElementById('image-gallery');
            const scrollAmount = gallery.clientWidth; 
            gallery.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        }

        // FUNGSI VALIDASI INPUT (Tanpa Auto-Scroll Gambar)
        function validatePhotoInput() {
            if (!mediaData || mediaData.type !== 'photo') return;
            let input = document.getElementById('photo-target');
            let max = mediaData.images.length;
            let val = parseInt(input.value);
            
            if (isNaN(val) || val < 1) val = 1;
            if (val > max) val = max;
            
            input.value = val;
            document.getElementById('target-label').innerText = val;
        }

        function updatePhotoInput(change) {
            let input = document.getElementById('photo-target');
            input.value = parseInt(input.value) + change;
            validatePhotoInput(); 
        }

        // INDIKATOR HALAMAN FOTO SAAT DI-SCROLL (Tanpa mengupdate box input)
        document.getElementById('image-gallery').addEventListener('scroll', () => {
            if (!mediaData || mediaData.type !== 'photo') return;
            
            const gallery = document.getElementById('image-gallery');
            let index = Math.round(gallery.scrollLeft / gallery.clientWidth) + 1;
            document.getElementById('image-counter').innerText = `${index} / ${mediaData.images.length}`;
        });

        async function fetchVideoInfo() {
            const urlInput = document.getElementById('url').value.trim();
            if (!urlInput.includes('tiktok.com')) {
                showToast('Harap masukkan URL TikTok yang valid!', true);
                return;
            }

            document.getElementById('search-section').style.display = 'none';
            document.getElementById('search-button').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const json = await response.json();

                const isPhoto = json.data.images && json.data.images.length > 0;
                if (!json.data || (!json.data.play && !isPhoto)) throw new Error("Konten tidak ditemukan atau Private");

                const qualityBadge = document.getElementById('quality-badge');
                const hdWarning = document.getElementById('hd-warning');
                const iconSlot1 = document.getElementById('icon-slot-1');
                const iconSlot2 = document.getElementById('icon-slot-2');
                
                document.getElementById('author-name').innerText = json.data.author.nickname;
                document.getElementById('author-username').innerText = `@${json.data.author.unique_id}`;
                document.getElementById('caption').value = json.data.title || "Tidak ada caption.";

                if (isPhoto) {
                    mediaData = { type: 'photo', id: json.data.id, images: json.data.images, ext: 'jpeg' };

                    document.getElementById('video-preview').style.display = 'none';
                    const gallery = document.getElementById('image-gallery');
                    gallery.style.display = 'flex';
                    gallery.innerHTML = '';
                    
                    json.data.images.forEach(imgUrl => {
                        let img = document.createElement('img');
                        img.src = imgUrl;
                        gallery.appendChild(img);
                    });
                    
                    document.getElementById('image-counter').style.display = 'block';
                    document.getElementById('image-counter').innerText = `1 / ${json.data.images.length}`;
                    
                    document.getElementById('prev-btn').style.display = 'flex';
                    document.getElementById('next-btn').style.display = 'flex';

                    // Atur UI Khusus Foto
                    iconSlot1.innerHTML = SVG_PHOTO;
                    iconSlot2.innerHTML = SVG_LAYERS;
                    document.getElementById('quality').innerText = 'Slide Foto';
                    document.getElementById('duration').innerText = `${json.data.images.length} Gambar`;
                    qualityBadge.classList.add('highlight');
                    hdWarning.style.display = 'none';
                    
                    document.getElementById('downloadBtnLabel').innerText = 'Download Semua Foto';
                    
                    // Menampilkan Menu Download Satuan
                    document.getElementById('single-photo-download').style.display = 'flex';
                    document.getElementById('photo-target').setAttribute('max', json.data.images.length);
                    document.getElementById('photo-target').value = 1;
                    document.getElementById('target-label').innerText = 1;

                } else {
                    const isHd = (json.data.hdplay != null && json.data.hdplay !== '');
                    mediaData = {
                        type: 'video', url: isHd ? json.data.hdplay : json.data.play, id: json.data.id,
                        quality: isHd ? 'HD Quality' : 'SD Quality', ext: 'mp4'
                    };

                    document.getElementById('image-gallery').style.display = 'none';
                    document.getElementById('image-counter').style.display = 'none';
                    document.getElementById('prev-btn').style.display = 'none';
                    document.getElementById('next-btn').style.display = 'none';
                    
                    // Sembunyikan Menu Download Satuan
                    document.getElementById('single-photo-download').style.display = 'none';

                    const videoEl = document.getElementById('video-preview');
                    videoEl.style.display = 'block';
                    videoEl.src = mediaData.url;

                    iconSlot1.innerHTML = SVG_VIDEO;
                    iconSlot2.innerHTML = SVG_CLOCK;
                    document.getElementById('quality').innerText = mediaData.quality;
                    document.getElementById('duration').innerText = formatDuration(json.data.duration);
                    document.getElementById('downloadBtnLabel').innerText = 'Download Video';

                    if (isHd) {
                        qualityBadge.classList.add('highlight');
                        hdWarning.style.display = 'none';
                    } else {
                        qualityBadge.classList.remove('highlight');
                        hdWarning.style.display = 'flex';
                    }
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('preview').style.display = 'block';

            } catch (error) {
                showToast(error.message, true);
                resetForm();
            }
        }

        function downloadFileByBlob(url, filename, progressCallback) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.responseType = 'blob';
                xhr.onprogress = (e) => {
                    if (e.lengthComputable && progressCallback) {
                        let percent = Math.round((e.loaded / e.total) * 100);
                        progressCallback(percent);
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const blobUrl = window.URL.createObjectURL(xhr.response);
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(blobUrl);
                        a.remove();
                        resolve();
                    } else {
                        window.open(url, '_blank');
                        resolve(); 
                    }
                };
                xhr.onerror = () => { window.open(url, '_blank'); resolve(); };
                xhr.send();
            });
        }

        // DOWNLOAD SEMUA (FOTO/VIDEO)
        async function startDownload() {
            if (isDownloading || !mediaData) return;
            isDownloading = true;

            const btnLabel = document.getElementById('downloadBtnLabel');
            const progress = document.getElementById('progressBar');
            
            if (mediaData.type === 'video') {
                btnLabel.innerText = 'Mengunduh... 0%';
                await downloadFileByBlob(mediaData.url, `TikTok_${mediaData.id}.${mediaData.ext}`, (percent) => {
                    progress.style.width = percent + '%';
                    btnLabel.innerText = `Mengunduh... ${percent}%`;
                });
                showToast('Video berhasil diunduh!');
            } 
            else if (mediaData.type === 'photo') {
                const totalPhotos = mediaData.images.length;
                for (let i = 0; i < totalPhotos; i++) {
                    btnLabel.innerText = `Mengunduh Foto ${i+1} dari ${totalPhotos}...`;
                    progress.style.width = Math.round(((i) / totalPhotos) * 100) + '%';
                    
                    await downloadFileByBlob(mediaData.images[i], `TikTok_${mediaData.id}_Slide${i+1}.${mediaData.ext}`, null);
                    await new Promise(r => setTimeout(r, 500)); 
                }
                progress.style.width = '100%';
                showToast('Semua foto berhasil diunduh!');
            }

            resetDownloadBtn();
        }

        // DOWNLOAD SATU FOTO SPESIFIK
        async function downloadSingle() {
            if (isDownloading || !mediaData || mediaData.type !== 'photo') return;
            
            let index = parseInt(document.getElementById('photo-target').value) - 1;
            let targetBtn = document.getElementById('singleDlBtn');
            let originalContent = targetBtn.innerHTML;
            
            targetBtn.innerHTML = 'Mengunduh...';
            targetBtn.style.opacity = '0.7';
            targetBtn.style.pointerEvents = 'none';
            isDownloading = true;
            
            await downloadFileByBlob(mediaData.images[index], `TikTok_${mediaData.id}_Slide${index+1}.${mediaData.ext}`, null);
            
            showToast(`Foto ke-${index+1} berhasil diunduh!`);
            
            targetBtn.innerHTML = originalContent;
            targetBtn.style.opacity = '1';
            targetBtn.style.pointerEvents = 'auto';
            isDownloading = false;
        }

        function resetDownloadBtn() {
            isDownloading = false;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('downloadBtnLabel').innerText = mediaData && mediaData.type === 'photo' ? 'Download Semua Foto' : 'Download Video';
        }

        function resetForm() {
            document.getElementById('url').value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('video-preview').pause();
            document.getElementById('video-preview').src = '';
            document.getElementById('image-gallery').innerHTML = '';
            document.getElementById('prev-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('single-photo-download').style.display = 'none';
            
            document.getElementById('search-section').style.display = 'flex';
            document.getElementById('search-button').style.display = 'flex';
            document.getElementById('loader').style.display = 'none';
            mediaData = null;
        }
    </script>
</body>
